<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifier</title>
<style>
body { 
  background: #0f172a; 
  color: white; 
  min-height: 100vh; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-family: Arial, sans-serif;
  padding: 20px;
}
.container { text-align: center; max-width: 400px; }
.btn { 
  background: #8b5cf6; 
  color: white; 
  border: none; 
  padding: 14px 40px; 
  border-radius: 24px; 
  font-size: 16px; 
  cursor: pointer; 
  width: 100%; 
  margin: 10px 0;
}
.status { 
  margin-top: 20px; 
  padding: 10px; 
  border-radius: 8px; 
  font-size: 14px;
}
.success { background: #22c55e; color: white; }
.error { background: #ef4444; color: white; }
.info { background: #3b82f6; color: white; }
</style>
</head>
<body>
<div class="container">
  <h1>🔔 Notifier</h1>
  <p style="color: #94a3b8; margin: 20px 0;">Нажми кнопку чтобы подписаться</p>
  <button class="btn" onclick="subscribe()">🔔 Подписаться</button>
  <div id="status" class="info">Загрузка OneSignal...</div>
</div>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>console.log('Скрипт загружен');

window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  console.log('OneSignal загружен!', OneSignal);
  
  await OneSignal.init({
    appId: "fa17302b-89af-4bc5-9d84-1e86997e06c2",
  });
  
  console.log('OneSignal инициализирован!');
  
  const status = document.getElementById('status');
  status.textContent = '✅ OneSignal готов! Нажми кнопку.';
  status.className = 'status info';
});

async function subscribe() {
  const status = document.getElementById('status');
  console.log('Нажата кнопка подписки');
  
  if (!window.OneSignal) {
    status.textContent = '❌ OneSignal не загрузился!';
    status.className = 'status error';
    console.error('OneSignal не найден');
    return;
  }
  
  try {
    console.log('Запрашиваем разрешение...');
    const permission = await OneSignal.Notifications.requestPermission(true);
    console.log('Разрешение:', permission);
    
    if (permission) {
      const userId = await OneSignal.User.PushSubscription.id;
      console.log('User ID:', userId);
      status.textContent = '✅ Подписан! ID: ' + userId;
      status.className = 'status success';
    } else {
      status.textContent = '❌ Разрешение не получено';
      status.className = 'status error';
    }
  } catch (error) {
    console.error('Ошибка:', error);
    status.textContent = '❌ Ошибка: ' + error.message;
    status.className = 'status error';
  }
}
</script>
</body></html>
