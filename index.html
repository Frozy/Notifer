<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notifier</title>
<style>
body { background: #0f172a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Arial; padding: 20px; }
.container { text-align: center; max-width: 400px; }
.btn { background: #8b5cf6; color: white; border: none; padding: 14px 40px; border-radius: 24px; font-size: 16px; cursor: pointer; width: 100%; margin: 10px 0; }
.status { margin-top: 20px; padding: 10px; border-radius: 8px; }
.success { background: #22c55e; }
.error { background: #ef4444; }
</style>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "fa17302b-89af-4bc5-9d84-1e86997e06c2",
    allowLocalhostAsSecureOrigin: true
  });
});
</script>
</head>
<body>
<div class="container">
  <h1>🔔 Notifier</h1>
  <button class="btn" onclick="subscribe()">Подписаться</button>
  <div id="status" class="status"></div>
</div>
<script>
async function subscribe() {
  const status = document.getElementById('status');
  if (!window.OneSignal) {
    status.textContent = '⏳ OneSignal загружается... Подожди 5 сек';
    status.className = 'status error';
    return;
  }
  try {
    const permission = await OneSignal.Notifications.requestPermission(true);
    if (permission) {
      const userId = await OneSignal.User.PushSubscription.id;
      status.textContent = '✅ Готово! ID: ' + userId;
      status.className = 'status success';
    } else {
      status.textContent = '❌ Запрещено';
      status.className = 'status error';
    }
  } catch (e) {
    status.textContent = '❌ ' + e.message;
    status.className = 'status error';
  }
}
</script>
</body>
</html>
