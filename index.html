<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifier</title>
<style>
body { 
  background: #0f172a; 
  color: white; 
  min-height: 100vh; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-family: Arial, sans-serif;
  padding: 20px;
}
.container { text-align: center; max-width: 400px; }
.icon { 
  width: 80px; height: 80px; 
  background: linear-gradient(135deg, #8b5cf6, #6d28d9); 
  border-radius: 20px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  margin: 0 auto 24px; 
  font-size: 40px; 
}
.btn { 
  background: #8b5cf6; 
  color: white; 
  border: none; 
  padding: 14px 40px; 
  border-radius: 24px; 
  font-size: 16px; 
  cursor: pointer; 
  width: 100%; 
  margin: 10px 0;
}
.status { margin-top: 20px; padding: 10px; border-radius: 8px; }
.success { background: #22c55e; color: white; }
.error { background: #ef4444; color: white; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">🔔</div>
  <h1>Notifier</h1>
  <p style="color: #94a3b8; margin: 20px 0;">Нажми кнопку чтобы подписаться на уведомления</p>
  <button class="btn" onclick="requestNotif()">🔔 Разрешить уведомления</button>
  <div id="status"></div>
</div>

<script>
async function requestNotif() {
  const status = document.getElementById('status');
  
  if (!('Notification' in window)) {
    status.innerHTML = '<div class="status error">❌ Уведомления не поддерживаются</div>';
    return;
  }
  
  const permission = await Notification.requestPermission();
  
  if (permission === 'granted') {
    status.innerHTML = '<div class="status success">✅ Готово! Теперь ты будешь получать уведомления!</div>';
    
    // Тестовое уведомление через 5 секунд
    setTimeout(() => {
      new Notification('Тест!', {
        body: 'Если ты это видишь — всё работает! ❤️',
        icon: 'https://telegram.org/img/t_logo.png'
      });
    }, 5000);
  } else {
    status.innerHTML = '<div class="status error">❌ Ты запретил уведомления</div>';
  }
}
</script>
</body>
</html>
